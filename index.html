<script>
const url = "https://opensheet.elk.sh/1wV5C8HiWWwf9pcjM8CqUT-z6U7ug3Opi3z7QDbufoYQ/1";

fetch(url)
  .then(res => {
    if (!res.ok) throw new Error("Failed to fetch");
    return res.json();
  })
  .then(data => {
    if (!data || data.length === 0) {
      document.body.innerHTML += "<p>No data found</p>";
      return;
    }

    let table = document.getElementById("dataTable");
    let headerRow = document.getElementById("headerRow");

    // headers
    Object.keys(data[0]).forEach(key => {
      headerRow.innerHTML += `<th>${key}</th>`;
    });

    // rows
    data.forEach(row => {
      let tr = "<tr>";
      Object.values(row).forEach(val => {
        tr += `<td>${val}</td>`;
      });
      tr += "</tr>";
      table.innerHTML += tr;
    });
  })
  .catch(err => {
    console.error(err);
    document.body.innerHTML += "<p style='color:red'>Error loading data</p>";
  });
</script>
