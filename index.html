<script>
const url = "https://docs.google.com/spreadsheets/d/1wV5C8HiWWwf9pcjM8CqUT-z6U7ug3Opi3z7QDbufoYQ/export?format=csv";

fetch(url)
  .then(response => response.text())
  .then(csv => {
    const rows = csv.split("\n").map(row => row.split(","));

    let table = document.getElementById("dataTable");
    let headerRow = document.getElementById("headerRow");

    // Headers
    rows[0].forEach(cell => {
      headerRow.innerHTML += `<th>${cell}</th>`;
    });

    // Data rows
    for (let i = 1; i < rows.length; i++) {
      let tr = "<tr>";
      rows[i].forEach(cell => {
        tr += `<td>${cell}</td>`;
      });
      tr += "</tr>";
      table.innerHTML += tr;
    }
  })
  .catch(err => {
    console.error(err);
    document.body.innerHTML += "<p style='color:red'>Error loading data</p>";
  });
</script>
