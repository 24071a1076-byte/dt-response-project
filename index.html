<!DOCTYPE html>
<html>
<head>
  <title>Form Responses</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    table {
      margin: auto;
      border-collapse: collapse;
      width: 80%;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }
    th {
      background: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>

<h2>Google Form Responses</h2>

<table id="dataTable">
  <tr>
    <th>How do you feel at this Temperature?</th>
    <th>Do you manually adjust fan speed?</th>
    <th>Do you forgot to turn off fan Or reduse the fan speed?</th>
    <th>Would you use an automatic fan controller?</th>
    <th>Suggestions!!</th>
  </tr>
</table>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS7c0jN0BWQSrNWNQPUm_Lu3OAaJu4Ns_NAzHIPCHX9wPRP2hmRKkNteub4WN0k-aVN2Pv5Zht-kn0k/pubhtml";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    document.getElementById("dataTable").innerHTML += data;
  });
</script>

</body>
</html>
