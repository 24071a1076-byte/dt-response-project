<!DOCTYPE html>
<html>
<head>
  <title>Smart Fan Survey Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 90%;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #4CAF50;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f1f1f1;
    }
  </style>
</head>

<body>

<h1>Smart Fan Survey Dashboard</h1>

<div class="cards">
  <div class="card">
    <h3>Total Responses</h3>
    <p id="total">0</p>
  </div>
  <div class="card">
    <h3>Too Hot %</h3>
    <p id="hot">0%</p>
  </div>
  <div class="card">
    <h3>Auto Fan Yes %</h3>
    <p id="auto">0%</p>
  </div>
</div>

<table>
  <thead>
    <tr id="headerRow"></tr>
  </thead>
  <tbody id="bodyData"></tbody>
</table>

<script>
const url = "https://script.google.com/macros/s/AKfycbzvHJvLBjD6UCXJtbkA8Hzu6IQz1TVbP-5kTaNbNLiJyvn03ZPpVsD_Uh6aDpdPnEUUAg/exec";

fetch(url)
  .then(res => res.json())
  .then(data => {

    const headerRow = document.getElementById("headerRow");
    const bodyData = document.getElementById("bodyData");

    headerRow.innerHTML = "";
    bodyData.innerHTML = "";

    // headers
    Object.keys(data[0]).forEach(key => {
      headerRow.innerHTML += `<th>${key}</th>`;
    });

    // stats
    let total = data.length;
    let hotCount = 0;
    let autoYes = 0;

    data.forEach(row => {
      let tr = "<tr>";

      Object.values(row).forEach(val => {
        tr += `<td>${val}</td>`;
      });

      tr += "</tr>";
      bodyData.innerHTML += tr;

      // stats logic
      if (row["How do you feel at this temperature?"] === "Too Hot") {
        hotCount++;
      }

      if (row["Would you use an automatic fan controller?"] === "Yes") {
        autoYes++;
      }
    });

    document.getElementById("total").innerText = total;
    document.getElementById("hot").innerText = ((hotCount/total)*100).toFixed(1) + "%";
    document.getElementById("auto").innerText = ((autoYes/total)*100).toFixed(1) + "%";

  });
</script>

</body>
</html>
